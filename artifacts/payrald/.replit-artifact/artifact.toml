kind = "web"
  previewPath = "/"
  title = "PayRald"
  version = "1.0.0"
  id = ""

  [[services]]
  localPort = 5173
  name = "PayRald App"
  paths = ["/"]

  [services.env]
  PORT = "5173"

  [services.development]
  run = "pnpm --filter @workspace/payrald run dev"

  [services.production]
  serve = "static"

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/payrald", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  