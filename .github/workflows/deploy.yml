name: Deploy PayRald UI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to payrald.rald.cloud
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write

    env:
      VITE_API_BASE: https://pay.rald.cloud

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build PayRald UI
        run: pnpm --filter @workspace/payrald run build
        env:
          VITE_API_BASE: https://pay.rald.cloud

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy artifacts/payrald/dist/public --project-name=payrald-ui --branch=main
