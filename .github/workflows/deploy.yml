name: Deploy PayRald UI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & deploy to payrald.rald.cloud
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build PayRald UI
        run: pnpm --filter @workspace/payrald run build
        env:
          VITE_API_BASE: https://pay.rald.cloud

      - name: Install Wrangler globally
        run: npm install -g wrangler@latest

      - name: Create CF Pages project (idempotent)
        run: |
          wrangler pages project create payrald-ui \
            --production-branch=main \
            2>&1 | grep -v "already exists" || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy artifacts/payrald/dist/public \
            --project-name=payrald-ui \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Add payrald.rald.cloud custom domain (idempotent)
        run: |
          wrangler pages domain add payrald.rald.cloud \
            --project-name=payrald-ui \
            2>&1 | grep -v "already exists" || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true
