name: Fix payrald.rald.cloud domain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-domain.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix:
    name: Attach payrald.rald.cloud to CF Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Attach custom domain via CF API (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CF_PROJECT="payrald-ui"
          CF_DOMAIN="payrald.rald.cloud"

          echo "Checking existing domains on $CF_PROJECT..."
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PROJECT/domains" \
            | jq -r ".result[]? | select(.name == \"$CF_DOMAIN\") | .name")

          if [ "$EXISTING" = "$CF_DOMAIN" ]; then
            echo "✅ $CF_DOMAIN already attached — checking status..."
            STATUS=$(curl -s \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PROJECT/domains" \
              | jq -r ".result[]? | select(.name == \"$CF_DOMAIN\") | .status")
            echo "Domain status: $STATUS"
            exit 0
          fi

          echo "Attaching $CF_DOMAIN to $CF_PROJECT..."
          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PROJECT/domains" \
            -d "{\"name\":\"$CF_DOMAIN\"}")
          echo "$RESP" | jq '.'
          echo "$RESP" | jq -e '.success' && echo "✅ Domain attached successfully" || echo "⚠ Check response above"

      - name: Verify Pages project and list all domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== payrald-ui project domains ==="
          curl -s \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/payrald-ui/domains" \
            | jq '[.result[]? | {name, status, created_on}]'

      - name: Smoke test
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://payrald.rald.cloud" || echo "000")
          echo "payrald.rald.cloud → HTTP $STATUS"
        continue-on-error: true
